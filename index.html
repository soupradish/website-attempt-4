<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenneth Jennings | Interactive Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <aside class="sidebar card fade-in">
      <div class="profile-img-container">
        <img src="https://media.licdn.com/dms/image/v2/D4E03AQGd-voe-xX7iQ/profile-displayphoto-scale_400_400/B4EZlaKF64HgAg-/0/1758154221504?e=1777507200&v=beta&t=ET1IoMvTpGbKIwmbat4JLt24YdTNs3mFhsREMReSK84" alt="Kenneth Jennings" class="profile-img">
      </div>
      <h1 id="name">Loading...</h1>
      <h2 id="headline"></h2>
      <p id="location" class="muted-text"></p>
      
      <div class="contact-links">
        <a id="email-link" href="#" class="btn primary-btn">Email Me</a>
        <a id="linkedin-link" href="#" target="_blank" class="btn secondary-btn">LinkedIn</a>
      </div>

      <div class="sidebar-section">
        <h3>Top Skills</h3>
        <div id="skills-container" class="tags-container"></div>
      </div>
      
      <div class="sidebar-section">
        <h3>Honors & Awards</h3>
        <ul id="awards-container" class="custom-list"></ul>
      </div>
    </aside>

    <main class="main-content">
      <nav class="tabs fade-in">
        <button class="tab-btn active" data-target="about">About</button>
        <button class="tab-btn" data-target="experience">Experience</button>
        <button class="tab-btn" data-target="education">Education</button>
      </nav>

      <div class="content-sections fade-in">
        <section id="about" class="tab-content active card">
          <h3>Summary</h3>
          <p id="summary-text"></p>
        </section>

        <section id="experience" class="tab-content card">
          <h3>Experience</h3>
          <div id="experience-container"></div>
        </section>

        <section id="education" class="tab-content card">
          <h3>Education</h3>
          <div id="education-container"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
